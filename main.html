<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<table border="1" width="100%" cellspacing="0" cellpadding="10">

    <!-- First Row -->
    <tr>
        
        <!-- Left Side -->
        <td width="50%" height="250">
            <table border="1" width="100%" cellspacing="0">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>

                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>

                <tr>
                    <td align="center">abc</td>
                    <td align="center">def</td>
                </tr>
            </table>
        </td>

        <!-- Right Side -->
        <td width="50%">
            <table border="1" width="100%" cellspacing="0">
                
                <tr>
                    <th>Nested Table 1</th>
                </tr>

                <tr>
                    <td>
                        <ul>
                            <li>List item</li>
                            <li>List item</li>
                            <li>List item</li>
                        </ul>
                    </td>
                </tr>

            </table>
        </td>

    </tr>

    <!-- Second Row -->
    <tr>

        <!-- Bottom Left -->
        <td>
            <table border="1" width="100%" cellspacing="0">

                <tr>
                    <th colspan="2">Nested Table 3</th>
                </tr>

                <tr>
                    <td>
                        <a href="#">Nested Table</a>
                    </td>

                    <td>Demo Continued</td>
                </tr>

            </table>
        </td>

        <!-- Bottom Right -->
        <td>
            <table border="1" width="100%" cellspacing="0">

                <tr>
                    <th>Nested Table 4</th>
                </tr>

                <tr>
                    <td align="center" bgcolor="black">
                        <font color="white">HTML</font>
                    </td>
                </tr>

            </table>
        </td>

    </tr>

</table>

</body>
</html>
